<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Individual Founder Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Individual Founder Registration</h1>
    <p class="tagline">Empowering visionaries with innovation</p>

    <!-- Personal Details -->
    <section>
      <h2>Personal Details</h2>
      <form id="individualForm">
        <input type="text" placeholder="Full Name" required>
        <input type="number" placeholder="Age" required>
        <select required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Contact Number" required>
        <input type="text" placeholder="Address" required>
        <input type="text" placeholder="Startup Domain / Category" required>

        <!-- Abstract Submission -->
        <h2>Abstract Submission</h2>
        <textarea id="abstract" placeholder="Write your abstract here..."></textarea>
        <p id="wordCount">Words: 0</p>

        <!-- Document Uploads -->
        <h2>Verification & Documents</h2>
        <div class="form-row">
          <label>Identity Proof (PDF/JPG/PNG)</label>
          <input type="file" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>
        <div class="form-row">
          <label>Startup Registration Certificate (PDF)</label>
          <input type="file" accept=".pdf" required>
        </div>
        <div class="form-row">
          <label>Startup Detailed Proposal (.doc/.docx)</label>
          <input type="file" accept=".doc,.docx" required>
        </div>

        <!-- Bottom Buttons -->
        <div class="button-group">
          <button type="submit" class="btn">Submit</button>
          <button type="button" class="btn" id="searchInvestorsBtn">Search Investors</button>
        </div>
      </form>
    </section>

    <section id="investorMatches" class="hidden">
      <h2>Matched Investors</h2>
      <div id="matchesContainer"></div>
    </section>
  </div>

  <script src="individual.js"></script>
</body>
</html>
