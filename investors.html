<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor - HerInvesto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Investor</h1>
    <p class="tagline">Fuel the Future with Your Investment</p>

    <form>
      <input type="text" placeholder="Name" required>
      <input type="text" placeholder="Organization" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <input type="text" placeholder="Investment Interest (e.g., AI, FinTech, Healthcare)" required>
      <button type="submit" class="btn">Register</button>
    </form>
  </div>
</body>
</html>
