<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder - HerInvesto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Founder</h1>
    <p class="tagline">Where bold ideas meet boundless opportunities</p>

    <div class="button-group">
  <a href="individual.html" class="btn">Individual Member</a>
  <a href="team.html" class="btn">Team / Build a Community</a>
</div>

  </div>

  <!-- Individual Modal -->
  <div class="modal" id="individualModal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Individual Registration</h2>
      <form>
        <input type="text" placeholder="Full Name" required>
        <input type="number" placeholder="Age" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Contact Number" required>
        <textarea placeholder="Startup Idea / Domain" required></textarea>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn">Register</button>
      </form>
    </div>
  </div>

  <!-- Team Modal -->
  <div class="modal" id="teamModal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Team Registration</h2>
      <form>
        <input type="text" placeholder="Team Name" required>
        <div class="team-members">
          <h3>Team Members (up to 5)</h3>
          <div class="member">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Role">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Contact">
          </div>
          <div class="member">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Role">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Contact">
          </div>
          <div class="member">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Role">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Contact">
          </div>
          <div class="member">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Role">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Contact">
          </div>
          <div class="member">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Role">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Contact">
          </div>
        </div>
        <h3>Login Credentials</h3>
        <input type="email" placeholder="Team Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn">Register</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
