<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Founder Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Team Founder Registration</h1>
    <p class="tagline">Collaborate, innovate, and grow together</p>

    <!-- Team Details -->
    <section>
      <h2>Team Details</h2>
      <form id="teamForm">
        <input type="text" placeholder="Team Name" required>
        <input type="text" placeholder="Startup Domain" required>
        <input type="email" placeholder="Team Email" required>
        <input type="password" placeholder="Password" required>

        <!-- Abstract Section -->
        <h2>Abstract Submission</h2>
        <textarea id="teamAbstract" placeholder="Write your abstract here..."></textarea>
        <p id="teamWordCount">Words: 0</p>

        <!-- Team Members -->
        <h2>Team Members</h2>
        <div id="membersContainer"></div>
        <button type="button" class="btn" id="addMemberBtn">Add Member</button>

        <!-- Document Uploads -->
        <h2>Documents</h2>
        <div class="form-row">
          <label>Team Leader Identity Proof (PDF/JPG/PNG)</label>
          <input type="file" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>
        <div class="form-row">
          <label>Startup Registration Certificate (PDF)</label>
          <input type="file" accept=".pdf" required>
        </div>
        <div class="form-row">
          <label>Detailed Startup Proposal (.doc/.docx)</label>
          <input type="file" accept=".doc,.docx" required>
        </div>
        <div class="form-row">
          <label>Pitch Deck (Optional, PDF)</label>
          <input type="file" accept=".pdf">
        </div>

        <!-- Bottom Buttons -->
        <div class="button-group">
          <button type="submit" class="btn">Submit</button>
          <button type="button" class="btn" id="teamSearchInvestorsBtn">Search Investors</button>
        </div>
      </form>
    </section>

    <!-- Investor Matches Section -->
    <section id="teamInvestorMatches" class="hidden">
      <h2>Matched Investors</h2>
      <div id="teamMatchesContainer"></div>
    </section>
  </div>

  <script src="team.js"></script>
</body>
</html>
